<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Refract — New Instance</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='-110 -110 220 220'><g><polygon points='0,-92 14,0 0,92 -14,0' fill='%235316D4'/><polygon points='0,-92 14,0 0,92 -14,0' fill='%233D0FA3' transform='rotate(30)'/><polygon points='0,-92 14,0 0,92 -14,0' fill='%238A52FF' transform='rotate(60)'/><polygon points='0,-92 14,0 0,92 -14,0' fill='%233D0FA3' transform='rotate(90)'/><polygon points='0,-92 14,0 0,92 -14,0' fill='%235316D4' transform='rotate(120)'/><polygon points='0,-92 14,0 0,92 -14,0' fill='%238A52FF' transform='rotate(150)'/></g><circle r='24' fill='%231B044F'/><circle r='6' fill='%23ECE4FF'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ════════════════════════════════════════════════════════════════
     Refract — New Instance modal
     Brand system lifted from the Refract website / launcher:
       deep violet-charcoal surfaces, single purple accent,
       Inter + JetBrains Mono, rounded cards, soft shadows.
     ════════════════════════════════════════════════════════════════ */

  /* ── DARK (default — matches the in-app launcher) ── */
  html[data-theme="dark"]{
    --bg:        #15101f;
    --backdrop:  #100b1a;
    --card:      #1d1731;
    --card-2:    #221a3a;
    --field:     #181226;
    --field-2:   #1f1834;
    --border:    #2d2446;
    --border-2:  #3b3057;

    --ink:   #f1ecfa;
    --ink-2: #c2b7da;
    --ink-3: #8d81a8;
    --ink-4: #6d6286;

    --p:        #8a52ff;
    --p-hover:  #9d6bff;
    --p-bright: #b693ff;
    --p-deep:   #c6abff;
    --p-tint:   color-mix(in srgb, var(--p) 18%, var(--card));
    --p-tint-2: color-mix(in srgb, var(--p) 30%, var(--card));
    --p-glow:   color-mix(in srgb, var(--p) 30%, transparent);
    --p-ring:   color-mix(in srgb, var(--p) 38%, transparent);

    --shadow-modal: 0 48px 100px -34px rgba(0,0,0,.78), 0 14px 38px -16px rgba(0,0,0,.6);
    --sky-1:#3a2a66; --sky-2:#5a3fa6;
  }
  /* ── LIGHT (website default) ── */
  html[data-theme="light"]{
    --bg:        #ffffff;
    --backdrop:  #efe9fc;
    --card:      #ffffff;
    --card-2:    #faf8ff;
    --field:     #faf8ff;
    --field-2:   #f3eeff;
    --border:    #e7ddf6;
    --border-2:  #d9caf0;

    --ink:   #220f44;
    --ink-2: #574a6e;
    --ink-3: #8a7da4;
    --ink-4: #a99dc0;

    --p:        #5316D4;
    --p-hover:  #6b2cf0;
    --p-bright: #8a52ff;
    --p-deep:   #3d0fa3;
    --p-tint:   color-mix(in srgb, var(--p) 8%, #fff);
    --p-tint-2: color-mix(in srgb, var(--p) 16%, #fff);
    --p-glow:   color-mix(in srgb, var(--p) 14%, transparent);
    --p-ring:   color-mix(in srgb, var(--p) 28%, transparent);

    --shadow-modal: 0 48px 96px -34px rgba(50,12,120,.34), 0 12px 32px -14px rgba(50,12,120,.2);
    --sky-1:#c9b6f5; --sky-2:#8a52ff;
  }

  :root{
    --font: 'Inter', ui-sans-serif, system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --radius: 14px;
    --radius-sm: 10px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow:hidden;
  }

  /* ── backdrop: dimmed launcher behind the modal ── */
  .scene{position:fixed;inset:0;display:grid;place-items:center;padding:32px;}
  .scene::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(1200px 700px at 70% -10%, var(--p-glow), transparent 60%),
      url("logo/screenshot.png") center top / cover no-repeat,
      var(--backdrop);
    filter:saturate(.9) brightness(.5) blur(3px);
    transform:scale(1.04);
  }
  .scene::after{
    content:"";position:absolute;inset:0;
    background:color-mix(in srgb, var(--backdrop) var(--dim,66%), transparent);
  }

  /* ════ MODAL ════ */
  .modal{
    position:relative;
    z-index:3;
    width:min(880px, 100%);
    max-height:calc(100vh - 64px);
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    box-shadow:var(--shadow-modal);
    display:flex;flex-direction:column;
    overflow:hidden;
  }

  /* ── header ── */
  .head{
    display:flex;align-items:center;gap:14px;
    padding:20px 22px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(var(--card-2), var(--card));
  }
  .head .mark{width:34px;height:34px;flex:none;filter:drop-shadow(0 2px 6px var(--p-glow));}
  .head .htxt{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;}
  .head h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1;}
  .head .sub{font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;color:var(--ink-3);text-transform:uppercase;}
  .x{
    width:34px;height:34px;flex:none;border-radius:9px;cursor:pointer;
    background:transparent;border:1px solid transparent;color:var(--ink-3);
    display:grid;place-items:center;transition:.15s;
  }
  .x:hover{background:var(--field-2);border-color:var(--border-2);color:var(--ink);}
  .x svg{width:17px;height:17px;}

  /* ── body grid ── */
  .body{display:grid;grid-template-columns:266px 1fr;min-height:0;overflow:hidden;}
  @media (max-width:720px){.body{grid-template-columns:1fr;}}

  /* ── left: live preview ── */
  .preview{
    padding:22px 20px;
    background:var(--card-2);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;gap:16px;
    overflow-y:auto;
  }
  @media (max-width:720px){.preview{border-right:0;border-bottom:1px solid var(--border);}}
  .preview .plabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-4);}

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 10px 30px -18px rgba(0,0,0,.5);
  }
  .card .thumb{
    height:128px;position:relative;overflow:hidden;
    image-rendering:pixelated;
    background:linear-gradient(var(--sky-1), var(--sky-2));
  }
  /* flat pixel skyline — squares only, brand-tinted */
  .card .thumb .sun{position:absolute;top:16px;right:18px;width:26px;height:26px;border-radius:50%;
    background:var(--p-bright);box-shadow:0 0 22px 4px var(--p-glow);}
  .card .thumb .stars{position:absolute;inset:0;
    background-image:
      radial-gradient(1.5px 1.5px at 22% 30%, #fff8, transparent),
      radial-gradient(1.5px 1.5px at 64% 20%, #ffffffaa, transparent),
      radial-gradient(1.5px 1.5px at 80% 44%, #fff7, transparent),
      radial-gradient(1.5px 1.5px at 40% 16%, #fff6, transparent);}
  .card .thumb .ground{position:absolute;left:0;right:0;bottom:0;height:46px;
    background:
      linear-gradient(#3aa05a,#3aa05a) 0 0/100% 9px no-repeat,
      linear-gradient(#7a5230,#5f3f24);
    box-shadow:inset 0 1px 0 #4fbf6e;}
  /* blocky hill silhouette */
  .card .thumb .skyline{position:absolute;left:0;right:0;bottom:44px;height:40px;
    background:
      linear-gradient(#2c1f4d,#2c1f4d) 6% 100%/14px 26px no-repeat,
      linear-gradient(#2c1f4d,#2c1f4d) 22% 100%/20px 38px no-repeat,
      linear-gradient(#2c1f4d,#2c1f4d) 44% 100%/16px 22px no-repeat,
      linear-gradient(#2c1f4d,#2c1f4d) 62% 100%/24px 32px no-repeat,
      linear-gradient(#2c1f4d,#2c1f4d) 84% 100%/16px 30px no-repeat;
    opacity:.55;}
  .card .cbody{padding:13px 14px 15px;display:flex;flex-direction:column;gap:9px;}
  .card .cname{font-size:15px;font-weight:700;letter-spacing:-.01em;line-height:1.2;color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card .cmeta{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);letter-spacing:.02em;}
  .card .crow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .ldr-tag{
    display:inline-flex;align-items:center;gap:6px;
    font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--p-deep);background:var(--p-tint);border:1px solid var(--p-tint-2);
    border-radius:6px;padding:3px 8px;
  }
  .ldr-tag .d{width:6px;height:6px;border-radius:50%;background:var(--p);}
  .ram-tag{
    margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-3);
    border:1px solid var(--border);border-radius:6px;padding:3px 8px;background:var(--field);
  }
  .pnote{font-size:12px;color:var(--ink-3);line-height:1.5;}
  .pnote b{color:var(--ink-2);font-weight:600;}

  /* ── right: form ── */
  .form{padding:22px 24px 4px;overflow-y:auto;display:flex;flex-direction:column;gap:18px;}
  .field{display:flex;flex-direction:column;gap:8px;}
  .lab{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .lab label{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);}

  .inp{
    width:100%;font-family:var(--font);font-size:15px;color:var(--ink);
    background:var(--field);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:12px 14px;outline:none;transition:.15s;
  }
  .inp::placeholder{color:var(--ink-4);}
  .inp:hover{border-color:var(--border-2);}
  .inp:focus{border-color:var(--p);box-shadow:0 0 0 4px var(--p-ring);background:var(--field-2);}

  /* version field w/ inline dropdown caret */
  .selwrap{position:relative;}
  .selwrap .caret{position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--ink-3);}
  select.inp{appearance:none;cursor:pointer;padding-right:38px;}

  /* checkbox */
  .check{display:inline-flex;align-items:center;gap:9px;cursor:pointer;user-select:none;}
  .check input{position:absolute;opacity:0;width:0;height:0;}
  .check .box{
    width:18px;height:18px;border-radius:5px;flex:none;
    background:var(--field);border:1.5px solid var(--border-2);
    display:grid;place-items:center;transition:.15s;color:#fff;
  }
  .check input:checked + .box{background:var(--p);border-color:var(--p);}
  .check .box svg{width:12px;height:12px;opacity:0;transform:scale(.6);transition:.15s;}
  .check input:checked + .box svg{opacity:1;transform:none;}
  .check span{font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);}
  .check:hover .box{border-color:var(--p-bright);}
  .check:hover span{color:var(--ink-2);}

  /* segmented loaders */
  .seg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  @media (max-width:560px){.seg{grid-template-columns:repeat(3,1fr);}}
  .seg button{
    font-family:var(--font);font-size:13px;font-weight:600;
    color:var(--ink-2);background:var(--field);
    border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:10px 6px;cursor:pointer;transition:.14s;
    display:flex;align-items:center;justify-content:center;gap:7px;
  }
  .seg button .glyph{width:13px;height:13px;flex:none;border-radius:3px;background:var(--ink-4);transition:.14s;}
  .seg button:hover{border-color:var(--border-2);color:var(--ink);background:var(--field-2);}
  .seg button[aria-pressed="true"]{
    background:var(--p-tint);border-color:var(--p);color:var(--p-deep);
    box-shadow:0 0 0 3px var(--p-ring);
  }
  .seg button[aria-pressed="true"] .glyph{background:var(--p);}

  /* memory slider */
  .mem-presets{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px;}
  .mem-presets button{
    flex:1;min-width:54px;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.04em;
    color:var(--ink-2);background:var(--field);border:1px solid var(--border);border-radius:8px;
    padding:8px 6px;cursor:pointer;transition:.14s;
  }
  .mem-presets button:hover{border-color:var(--border-2);color:var(--ink);}
  .mem-presets button[aria-pressed="true"]{background:var(--p-tint);border-color:var(--p);color:var(--p-deep);}
  .memval{font-family:var(--mono);font-size:12px;color:var(--p-deep);font-weight:600;}

  input[type=range].slider{
    -webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:99px;cursor:pointer;margin:4px 0 0;
    background:linear-gradient(90deg, var(--p) 0%, var(--p) var(--fill,30%), var(--field-2) var(--fill,30%), var(--field-2) 100%);
    border:1px solid var(--border);
  }
  input[type=range].slider::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;
    background:#fff;border:4px solid var(--p);box-shadow:0 2px 6px rgba(0,0,0,.4);cursor:grab;
  }
  input[type=range].slider::-moz-range-thumb{
    width:18px;height:18px;border-radius:50%;background:#fff;border:4px solid var(--p);box-shadow:0 2px 6px rgba(0,0,0,.4);cursor:grab;border:4px solid var(--p);
  }

  /* ── footer ── */
  .foot{
    display:flex;align-items:center;gap:10px;
    padding:16px 22px;
    border-top:1px solid var(--border);
    background:var(--card-2);
  }
  .foot .spacer{flex:1;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font-family:var(--font);font-weight:600;font-size:14px;
    border-radius:var(--radius-sm);border:1px solid transparent;cursor:pointer;
    padding:11px 16px;transition:transform .12s ease, background .15s, border-color .15s, box-shadow .15s;
    white-space:nowrap;
  }
  .btn svg{width:16px;height:16px;}
  .btn-ghost{background:transparent;color:var(--ink-2);border-color:var(--border-2);}
  .btn-ghost:hover{color:var(--ink);border-color:var(--p-bright);background:var(--field-2);}
  .btn-soft{background:var(--p-tint);color:var(--p-deep);border-color:var(--p-tint-2);}
  .btn-soft:hover{background:var(--p-tint-2);transform:translateY(-1px);}
  .btn-primary{background:var(--p);color:#fff;box-shadow:0 8px 20px -8px var(--p-glow), 0 2px 0 rgba(0,0,0,.18);}
  .btn-primary:hover{background:var(--p-hover);transform:translateY(-1px);}
  .btn-primary:active{transform:translateY(0);}
  .btn-sm{font-size:13px;padding:11px 13px;}

  /* scrollbars */
  .preview::-webkit-scrollbar,.form::-webkit-scrollbar{width:9px;}
  .preview::-webkit-scrollbar-thumb,.form::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:99px;border:2px solid transparent;background-clip:padding-box;}

  /* theme toggle (top-right of scene, for demo) */
  .demo-theme{
    position:fixed;top:18px;right:18px;z-index:20;
    width:40px;height:40px;border-radius:11px;cursor:pointer;
    background:color-mix(in srgb, var(--card) 80%, transparent);
    border:1px solid var(--border-2);color:var(--ink-2);
    display:grid;place-items:center;backdrop-filter:blur(8px);transition:.15s;
  }
  .demo-theme:hover{color:var(--p);border-color:var(--p-bright);}
  .demo-theme svg{width:19px;height:19px;}
  .i-moon{display:none;}
  html[data-theme="dark"] .i-sun{display:none;}
  html[data-theme="dark"] .i-moon{display:block;}
</style>
</head>
<body>

<button class="demo-theme" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">
  <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.6 4.6l1.7 1.7M17.7 17.7l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.6 19.4l1.7-1.7M17.7 6.3l1.7-1.7"/></svg>
  <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13.2A7.6 7.6 0 0 1 10.8 4a.8.8 0 0 0-1.06-.9A8.6 8.6 0 1 0 20.9 14.3a.8.8 0 0 0-.9-1.1z"/></svg>
</button>

<div class="scene">
  <div class="modal" role="dialog" aria-modal="true" aria-label="New instance">

    <!-- header -->
    <div class="head">
      <span class="mark" id="mark"></span>
      <div class="htxt">
        <h1>New Instance</h1>
        <span class="sub">Set it up · launch in seconds</span>
      </div>
      <button class="x" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>

    <!-- body -->
    <div class="body">

      <!-- live preview -->
      <aside class="preview">
        <div class="plabel">Live preview</div>
        <div class="card">
          <div class="thumb">
            <div class="stars"></div>
            <div class="sun"></div>
            <div class="skyline"></div>
            <div class="ground"></div>
          </div>
          <div class="cbody">
            <div class="cname" id="pvName">My Instance</div>
            <div class="cmeta" id="pvVer">Minecraft 1.21.1</div>
            <div class="crow">
              <span class="ldr-tag"><span class="d"></span><span id="pvLoader">Vanilla</span></span>
              <span class="ram-tag" id="pvRam">2 GB</span>
            </div>
          </div>
        </div>
        <p class="pnote">This is how <b id="pvName2">My Instance</b> will appear in your library. Java is installed automatically for the version you pick.</p>
      </aside>

      <!-- form -->
      <div class="form">

        <div class="field">
          <div class="lab"><label for="fName">Instance name</label></div>
          <input class="inp" id="fName" type="text" value="My Instance" autocomplete="off" spellcheck="false" />
        </div>

        <div class="field">
          <div class="lab">
            <label for="fVer">Minecraft version</label>
            <label class="check">
              <input type="checkbox" id="fSnap" />
              <span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5 9-11"/></svg></span>
              <span>Show snapshots</span>
            </label>
          </div>
          <div class="selwrap">
            <select class="inp" id="fVer">
              <option>1.21.1</option>
              <option>1.21</option>
              <option>1.20.6</option>
              <option>1.20.4</option>
              <option>1.20.1</option>
              <option>1.19.4</option>
              <option>1.18.2</option>
              <option>1.16.5</option>
              <option>1.12.2</option>
              <option>1.8.9</option>
            </select>
            <span class="caret"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>
          </div>
        </div>

        <div class="field">
          <div class="lab"><label>Mod loader</label></div>
          <div class="seg" id="seg">
            <button aria-pressed="true"  data-loader="Vanilla"><span class="glyph"></span>Vanilla</button>
            <button aria-pressed="false" data-loader="Fabric"><span class="glyph"></span>Fabric</button>
            <button aria-pressed="false" data-loader="Forge"><span class="glyph"></span>Forge</button>
            <button aria-pressed="false" data-loader="Quilt"><span class="glyph"></span>Quilt</button>
            <button aria-pressed="false" data-loader="NeoForge"><span class="glyph"></span>NeoForge</button>
          </div>
        </div>

        <div class="field">
          <div class="lab">
            <label for="fMem">Memory</label>
            <span class="memval"><span id="memNum">2</span> GB allocated</span>
          </div>
          <input class="slider" id="fMem" type="range" min="1" max="16" step="1" value="2" />
          <div class="mem-presets" id="memPresets">
            <button data-mem="1">1G</button>
            <button data-mem="2" aria-pressed="true">2G</button>
            <button data-mem="4">4G</button>
            <button data-mem="8">8G</button>
            <button data-mem="16">16G</button>
          </div>
        </div>

        <div class="field">
          <div class="lab"><label for="fGroup">Group <span style="text-transform:none;letter-spacing:0;color:var(--ink-4)">(optional)</span></label></div>
          <input class="inp" id="fGroup" type="text" placeholder="e.g. Modded, Vanilla, Survival…" autocomplete="off" />
        </div>

      </div>

  <svg viewBox="-110 -110 220 220" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block">
    <g>
      <polygon points="0,-92 14,0 0,92 -14,0" fill="#5316D4"/>
      <polygon points="0,-92 14,0 0,92 -14,0" fill="#3D0FA3" transform="rotate(30)"/>
      <polygon points="0,-92 14,0 0,92 -14,0" fill="#8A52FF" transform="rotate(60)"/>
      <polygon points="0,-92 14,0 0,92 -14,0" fill="#3D0FA3" transform="rotate(90)"/>
      <polygon points="0,-92 14,0 0,92 -14,0" fill="#5316D4" transform="rotate(120)"/>
      <polygon points="0,-92 14,0 0,92 -14,0" fill="#8A52FF" transform="rotate(150)"/>
    </g>
    <circle r="24" fill="#1B044F"/>
    <circle r="6" fill="#ECE4FF"/>
  </svg>
</template>

<script>
  // iris logo
  document.getElementById('mark').appendChild(document.getElementById('irisTpl').content.cloneNode(true));

  // theme toggle
  (function(){
    var root = document.documentElement;
    try{ var t = localStorage.getItem('refract-ni-theme'); if(t) root.setAttribute('data-theme', t); }catch(e){}
    document.getElementById('themeBtn').addEventListener('click', function(){
      var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      try{ localStorage.setItem('refract-ni-theme', next); }catch(e){}
    });
  })();

  // ── live preview wiring ──
  var fName = document.getElementById('fName');
  var fVer  = document.getElementById('fVer');
  var pvName = document.getElementById('pvName');
  var pvName2 = document.getElementById('pvName2');
  var pvVer = document.getElementById('pvVer');
  var pvLoader = document.getElementById('pvLoader');
  var pvRam = document.getElementById('pvRam');

  function syncName(){
    var v = fName.value.trim() || 'My Instance';
    pvName.textContent = v; pvName2.textContent = v;
  }
  fName.addEventListener('input', syncName);
  fVer.addEventListener('change', function(){ pvVer.textContent = 'Minecraft ' + fVer.value; });

  // loader segmented
  var seg = document.getElementById('seg');
  seg.addEventListener('click', function(e){
    var b = e.target.closest('button'); if(!b) return;
    seg.querySelectorAll('button').forEach(function(x){ x.setAttribute('aria-pressed','false'); });
    b.setAttribute('aria-pressed','true');
    pvLoader.textContent = b.dataset.loader;
  });

  // memory slider + presets
  var fMem = document.getElementById('fMem');
  var memNum = document.getElementById('memNum');
  var memPresets = document.getElementById('memPresets');
  function setMem(g, fromSlider){
    g = Math.max(1, Math.min(16, parseInt(g,10)||2));
    if(!fromSlider) fMem.value = g;
    memNum.textContent = g;
    pvRam.textContent = g + ' GB';
    var pct = ((g - 1) / (16 - 1)) * 100;
    fMem.style.setProperty('--fill', pct + '%');
    memPresets.querySelectorAll('button').forEach(function(x){
      x.setAttribute('aria-pressed', String(parseInt(x.dataset.mem,10) === g));
    });
  }
  fMem.addEventListener('input', function(){ setMem(fMem.value, true); });
  memPresets.addEventListener('click', function(e){
    var b = e.target.closest('button'); if(!b) return;
    setMem(b.dataset.mem, false);
  });
  setMem(2);
</script>
